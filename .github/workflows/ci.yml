name: Continuous Integration

on:
  # รัน CI ทุกครั้งที่มีการ Push หรือเปิด Pull Request เข้าหา branch main
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- Job 1: ตรวจสอบ Syntax ของ Python ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Install Linting Tools
        run: |
          pip install flake8
          
      - name: Lint with flake8
        run: |
          # ตรวจเช็ค Syntax errors หรือชื่อตัวแปรที่ไม่ได้นิยาม
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # --- Job 2: ทดสอบการ Build Docker ---
  build-test:
    needs: lint # ต้องผ่านการตรวจ Syntax ก่อนถึงจะบิลด์ Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          # ทดสอบบิลด์ Backend เพื่อดูว่า Dockerfile และ requirements.txt ทำงานได้จริงไหม
          docker compose build backend
          
      - name: Run Test Container (Smoke Test)
        run: |
          # รันคอนเทนเนอร์ขึ้นมาสั้นๆ เพื่อเช็คว่า Flask สตาร์ทติดไหม
          docker compose up -d backend
          sleep 5
          docker ps | grep assignment_backend
          docker compose down

  # --- Job 3: Database Check 
  db-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Test Docker Compose with MSSQL
        run: |
          # ทดสอบว่า docker-compose.yml ของคุณรัน MSSQL และ Backend คู่กันได้
          docker compose up -d
          # รอให้ MSSQL สตาร์ท (MSSQL ใช้เวลาสลัดตัวนานนิดนึง)
          sleep 20 
          docker ps
          docker compose down