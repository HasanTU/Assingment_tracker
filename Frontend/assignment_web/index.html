<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Assignment Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <section class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                </div>
                <h1>Assignment Hub</h1>
                <p class="mb-2">ระบบจัดการการส่งงาน เพื่อประสิทธิภาพการเรียนรู้</p>
                
                <div class="form-group mt-4">
                    <label>ชื่อผู้ใช้งาน / อีเมล</label>
                    <input type="text" class="input-soft" placeholder="example@university.ac.th">
                </div>
                
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" class="input-soft" placeholder="••••••••">
                </div>
                
                <div class="social-login">
                    <a href="student.html" class="btn-social" style="text-decoration: none; flex-direction: column; padding: 20px; height: auto;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                        <span class="label-sm">นักศึกษา</span>
                    </a>
                    <a href="teacher.html" class="btn-primary" style="text-decoration: none; flex-direction: column; padding: 20px; height: auto;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                        <span class="label-sm" style="color: white;">อาจารย์</span>
                    </a>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
