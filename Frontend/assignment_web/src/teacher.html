<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher - Assignment Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Assignment Hub</div>
        <div class="user-profile">
            <span class="label-sm">อ.สมชาย ใจดี</span>
            <img src="https://picsum.photos/seed/man/100/100" class="avatar">
            <a href="index.html" class="close-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            </a>
        </div>
    </nav>

    <main class="page active">
        <div class="dashboard-grid">
            <div class="sidebar-card">
                <div class="sidebar-header"><h2>สร้างงานใหม่</h2></div>
                <div class="form-group">
                    <label>หัวข้องาน</label>
                    <input type="text" class="input-soft" placeholder="ระบุชื่อผลงาน...">
                </div>
                <div class="form-group">
                    <label>กำหนดส่ง</label>
                    <input type="date" class="input-soft">
                </div>
                <button class="btn-primary">ประกาศงานใหม่</button>
            </div>

            <div class="assignment-list">
                <h2>ติดตามการส่งงาน</h2>
                <table>
                    <thead>
                        <tr>
                            <th class="label-sm">รหัสนิสิต</th>
                            <th class="label-sm">สถานะ</th>
                            <th class="label-sm">คะแนน (20)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>64010021</td>
                            <td><span class="status-chip status-submitted">ตรงเวลา</span></td>
                            <td><input type="number" class="input-soft" style="width: 80px;" value="18"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
